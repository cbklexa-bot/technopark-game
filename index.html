<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #FF9F0A;
            --bg: #000000;
            --card: rgba(255, 255, 255, 0.07);
            --glass: blur(20px);
            --status-free: #30D158;
            --status-busy: #FF453A;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg); color: white; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden; touch-action: none; height: 100vh; width: 100vw;
        }

        /* Экраны */
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; position: absolute; }
        .active { display: flex; }

        /* Верхняя панель (Главная) */
        .main-header {
            padding: calc(15px + var(--tg-safe-area-inset-top)) 20px 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .user-block { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 38px; height: 38px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }
        
        .balance-block { 
            background: var(--card); padding: 5px 5px 5px 15px; border-radius: 14px; 
            display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1);
        }
        .deposit-btn { 
            background: var(--accent); color: black; border: none; width: 28px; height: 28px; 
            border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer;
        }

        /* Карточка ИГРАТЬ */
        .hero-card {
            margin: 20px; padding: 45px 20px; border-radius: 28px;
            background: linear-gradient(135deg, #FF9F0A 0%, #FF3B30 100%);
            text-align: center; box-shadow: 0 10px 30px rgba(255, 159, 10, 0.2);
        }
        .hero-card h1 { margin: 0; font-size: 32px; letter-spacing: 1px; }

        /* Гараж */
        .garage-container { padding: 10px 20px; }
        .garage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        
        .vehicle-card {
            background: var(--card); border-radius: 20px; padding: 12px;
            border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        .vehicle-img { height: 60px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; }
        .v-name { font-size: 14px; font-weight: 600; display: block; margin-bottom: 4px; }
        
        .status-tag { font-size: 10px; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; }
        .status-free { background: rgba(48, 209, 88, 0.2); color: var(--status-free); }
        .status-busy { background: rgba(255, 69, 58, 0.2); color: var(--status-busy); }

        /* Игровой интерфейс */
        .game-top-bar {
            position: absolute; top: 0; width: 100%;
            padding: calc(10px + var(--tg-safe-area-inset-top)) 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; pointer-events: none;
        }
        .game-top-bar * { pointer-events: auto; }
        
        .timer-display { font-family: monospace; font-size: 24px; color: var(--accent); text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .sos-btn { background: #FF3B30; border: none; color: white; padding: 8px 16px; border-radius: 10px; font-weight: bold; }

        /* Джойстики (Новая логика) */
        .joy-wrapper {
            position: absolute; bottom: calc(40px + var(--tg-safe-area-inset-bottom));
            width: 130px; height: 130px; border-radius: 50%;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px); touch-action: none;
        }
        .joy-stick {
            position: absolute; top: 50%; left: 50%;
            width: 60px; height: 60px; margin: -30px 0 0 -30px;
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%; pointer-events: none;
        }
        #joy-left { left: 40px; }
        #joy-right { right: 40px; }

        /* Bottom Sheet */
        .sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #121212; border-radius: 25px 25px 0 0;
            padding: 25px 20px calc(20px + var(--tg-safe-area-inset-bottom));
            transition: 0.3s ease-out; z-index: 200;
        }
        .sheet.open { bottom: 0; }
        .time-btn {
            background: var(--card); padding: 18px; border-radius: 16px;
            display: flex; justify-content: space-between; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div id="screen-main" class="screen active">
        <div class="main-header">
            <div class="user-block">
                <div class="avatar" id="u-avatar">?</div>
                <div style="font-weight: 600;" id="u-name">Загрузка...</div>
            </div>
            <div class="balance-block">
                <span style="font-weight: bold;"><span id="u-balance">500</span> ₽</span>
                <button class="deposit-btn" onclick="tg.showAlert('Пополнение скоро будет доступно!')">+</button>
            </div>
        </div>

        <div class="hero-card" onclick="goToGarage()">
            <h1>ИГРАТЬ</h1>
            <div style="opacity:0.8; margin-top:5px">Начни онлайн-заезд сейчас</div>
        </div>
        
        <div style="text-align: center; margin-top: auto; padding-bottom: 30px; opacity: 0.3; font-size: 12px;">
            TEHNOPARK CONTROL v1.5
        </div>
    </div>

    <div id="screen-garage" class="screen">
        <div class="garage-container">
            <h2 style="margin: 20px 0 5px; font-size: 26px;">Гараж</h2>
            <p style="color: #888; margin: 0 0 20px; font-size: 14px;">Выбери доступную технику</p>
            
            <div class="garage-grid">
                <div class="vehicle-card" onclick="selectVehicle('ПОГРУЗЧИК', 'free')">
                    <div class="vehicle-img"></div>
                    <span class="v-name">ПОГРУЗЧИК</span>
                    <span class="status-tag status-free">Свободен</span>
                </div>
                <div class="vehicle-card" style="opacity: 0.6;" onclick="tg.showConfirm('Техника занята. Уведомить о завершении?')">
                    <div class="vehicle-img"></div>
                    <span class="v-name">САМОСВАЛ</span>
                    <span class="status-tag status-busy">Занят (3 мин)</span>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="game-top-bar">
            <div class="timer-display" id="timer">10:00</div>
            <button class="sos-btn" onclick="exitGame()">SOS</button>
        </div>

        <div id="video-bg" style="width:100%; height:100%; background:#050505;"></div>

        <div id="joy-left" class="joy-wrapper">
            <div class="joy-stick" id="stick-left"></div>
        </div>
        <div id="joy-right" class="joy-wrapper">
            <div class="joy-stick" id="stick-right"></div>
        </div>
    </div>

    <div id="time-sheet" class="sheet">
        <h3 id="sheet-title" style="margin-top:0">Аренда техники</h3>
        <div class="time-btn" onclick="startSession(10)">
            <span>10 минут заезда</span> <b>100 ₽</b>
        </div>
        <div class="time-btn" onclick="startSession(15)">
            <span>15 минут заезда</span> <b>140 ₽</b>
        </div>
        <button onclick="closeSheet()" style="width:100%; background:none; border:none; color:#666; margin-top:10px;">ОТМЕНА</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        // Попытка войти в Fullscreen для скрытия статус-бара
        if (tg.requestFullscreen) tg.requestFullscreen();

        // 1. НАВИГАЦИЯ (Используем BackButton Telegram)
        function goToGarage() {
            showScreen('screen-garage');
            tg.BackButton.show();
        }

        tg.BackButton.onClick(() => {
            if (document.getElementById('screen-garage').classList.contains('active')) {
                showScreen('screen-main');
                tg.BackButton.hide();
            } else if (document.getElementById('screen-game').classList.contains('active')) {
                exitGame();
            }
        });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            closeSheet();
        }

        function selectVehicle(name, status) {
            if(status === 'free') {
                document.getElementById('sheet-title').innerText = name;
                document.getElementById('time-sheet').classList.add('open');
            }
        }

        function closeSheet() { document.getElementById('time-sheet').classList.remove('open'); }

        function startSession(min) {
            showScreen('screen-game');
            tg.BackButton.show();
        }

        function exitGame() {
            tg.showConfirm("Завершить игру?", (ok) => {
                if(ok) {
                    showScreen('screen-main');
                    tg.BackButton.hide();
                }
            });
        }

        // 2. УМНЫЕ ДЖОЙСТИКИ (Мультитач исправлен)
        function initJoystick(containerId, stickId, callback) {
            const container = document.getElementById(containerId);
            const stick = document.getElementById(stickId);
            let touchId = null;

            container.addEventListener('touchstart', (e) => {
                if (touchId !== null) return;
                const touch = e.changedTouches[0];
                touchId = touch.identifier;
                updateJoy(touch);
            }, {passive: false});

            window.addEventListener('touchmove', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === touchId) {
                        updateJoy(e.changedTouches[i]);
                        e.preventDefault();
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === touchId) {
                        touchId = null;
                        stick.style.transform = `translate(0,0)`;
                        callback(0, 0);
                    }
                }
            });

            function updateJoy(touch) {
                const rect = container.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                let x = touch.clientX - centerX;
                let y = touch.clientY - centerY;
                
                const limit = 50;
                const dist = Math.sqrt(x*x + y*y);
                if (dist > limit) {
                    x *= limit / dist;
                    y *= limit / dist;
                }
                stick.style.transform = `translate(${x}px, ${y}px)`;
                callback(Math.round(x), Math.round(y));
            }
        }

        initJoystick('joy-left', 'stick-left', (x, y) => console.log('Left:', x, y));
        initJoystick('joy-right', 'stick-right', (x, y) => console.log('Right:', x, y));

        // Данные юзера
        document.getElementById('u-name').innerText = tg.initDataUnsafe.user?.first_name || "Пилот";
        document.getElementById('u-avatar').innerText = (tg.initDataUnsafe.user?.first_name || "P")[0];
    </script>
</body>
</html>
