<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Технопарк</title>
    <style>
        :root {
            --primary-orange: #ff8c00;
            --bg-dark: #0a0a0a;
            --text-white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100%;
        }

        /* Шапка профиля */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
        }

        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; background: var(--primary-orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .balance-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            border: 1px solid rgba(255, 140, 0, 0.3);
        }

        /* Главная кнопка Играть */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 150px);
            text-align: center;
        }

        .play-btn {
            background: linear-gradient(45deg, #ff8c00, #ff4500);
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 25px;
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            color: white;
            box-shadow: 0 10px 25px rgba(255, 70, 0, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
        }

        /* Улучшенная видимость текста под кнопкой */
        .play-subtext {
            margin-top: 15px;
            font-size: 16px;
            color: #ffffff;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); /* Тень для четкости */
            opacity: 1 !important;
        }

        /* Полноэкранная трансляция в ландшафте */
        #stream-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: none;
            z-index: 1000;
        }

        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Растягиваем на весь экран */
        }

        /* Скрытие лишних элементов в горизонтальном режиме */
        @media (orientation: landscape) {
            .header, .footer, .play-subtext {
                display: none !important;
            }
            .main-container { padding: 0; height: 100vh; }
            #stream-container { display: block; }
            
            /* Убираем "шапку" при повороте */
            body { padding-top: 0 !important; }
        }

        /* Джойстики */
        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .joystick {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            pointer-events: auto;
        }

        /* Футер */
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="header">
            <div class="user-info">
                <div class="avatar">А</div>
                <div class="user-name">Алексей</div>
            </div>
            <div class="balance-btn">
                <span id="balance-value">500</span> монет
                <span style="color: var(--primary-orange); font-weight: bold; margin-left: 5px;">+</span>
            </div>
        </div>

        <div class="main-container">
            <button class="play-btn" onclick="startGame()">ИГРАТЬ</button>
            <div class="play-subtext">Начни онлайн-заезд прямо сейчас</div>
        </div>

        <div class="footer">
            Технопарк версия 1
        </div>
    </div>

    <div id="stream-container">
        <video id="video-feed" autoplay playsinline muted></video>
        <div class="controls">
            <div class="joystick" id="left-joy"></div>
            <div class="joystick" id="right-joy"></div>
        </div>
        <button onclick="closeGame()" style="position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); color: #fff; border: none; padding: 10px; border-radius: 5px; z-index: 1001;">✕ Назад</button>
    </div>

    <script>
        // Логика переключения экранов
        function startGame() {
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('stream-container').style.display = 'block';
            // Здесь будет инициализация WebRTC или RTSP стрима
        }

        function closeGame() {
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('stream-container').style.display = 'none';
        }

        // Пример выбора пакета (монеты вместо рублей)
        const prices = {
            "10_min": 100, // монет
            "15_min": 140, // монет
            "30_min": 250  // монет
        };
    </script>
</body>
</html>
