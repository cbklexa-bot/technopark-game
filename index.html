<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TechnoPark Online</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    
    <style>
        /* Базовый сброс и блокировка системных жестов */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-user-select: none;
            touch-action: none; /* Отключаем системный свайп/скролл */
        }
        
        body, html {
            width: 100%; height: 100%;
            background-color: #0d0d0d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* --- ЭКРАН АВТОРИЗАЦИИ И МЕНЮ --- */
        #menu-screen {
            display: flex; flex-direction: column;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            padding: 20px;
            position: relative;
        }

        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        
        .user-info { font-size: 18px; font-weight: 600; }
        .balance-box {
            background: rgba(255, 159, 10, 0.2); border: 1px solid #ff9f0a;
            padding: 8px 16px; border-radius: 20px; font-weight: bold; color: #ff9f0a;
        }

        .vehicles-container {
            display: flex; gap: 20px; justify-content: center; align-items: stretch;
            flex-grow: 1; padding: 20px 0;
        }

        .vehicle-card {
            background: #222; border: 2px solid #333; border-radius: 16px;
            padding: 20px; width: 45%; max-width: 300px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .vehicle-card.active { border-color: #ff9f0a; background: #2a2a2a; }
        .vehicle-card h2 { margin-bottom: 15px; font-size: 22px; text-align: center; }
        
        .status-badge {
            padding: 6px 12px; border-radius: 12px; font-size: 14px; font-weight: bold; margin-bottom: 20px;
        }
        .status-free { background: rgba(48, 209, 88, 0.2); color: #30d158; }
        .status-busy { background: rgba(255, 69, 58, 0.2); color: #ff453a; }

        .btn-rent {
            background: #ff9f0a; color: #000; border: none;
            padding: 15px; width: 100%; font-size: 18px; font-weight: bold;
            border-radius: 12px; cursor: pointer; text-transform: uppercase;
        }
        .btn-rent:disabled { background: #555; color: #888; cursor: not-allowed; }

        /* --- ИГРОВОЙ ЭКРАН --- */
        #game-screen {
            display: none; position: relative; width: 100%; height: 100%; background: #000;
        }

        #video-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        #video-player { width: 100%; height: 100%; object-fit: cover; }

        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; /* Пропускаем клики на джойстики */
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* Верхняя панель управления (HUD) */
        .hud-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 15px; pointer-events: auto; /* Возвращаем клики для кнопок */
        }

        .hud-btn {
            background: rgba(0, 0, 0, 0.6); border: 1px solid #555; color: #fff;
            padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 16px;
            backdrop-filter: blur(5px); cursor: pointer;
        }
        .hud-btn:active { background: rgba(255, 255, 255, 0.2); }
        .hud-btn.sos { background: rgba(255, 69, 58, 0.7); border-color: #ff453a; }
        
        .timer-box {
            background: rgba(0, 0, 0, 0.7); border: 1px solid #ff9f0a; color: #ff9f0a;
            padding: 10px 25px; border-radius: 8px; font-size: 20px; font-weight: bold; font-variant-numeric: tabular-nums;
        }

        /* Зоны джойстиков */
        .joystick-container {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 40px 40px 40px; height: 60%; pointer-events: none;
        }
        .joystick-zone {
            width: 180px; height: 180px; position: relative; pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div class="top-nav">
            <div class="user-info" id="user-name">Загрузка...</div>
            <div class="balance-box" onclick="haptic()">Баланс: <span id="user-balance">500</span> ₽</div>
        </div>

        <div class="vehicles-container">
            <div class="vehicle-card active" id="card-loader" onclick="selectVehicle('loader')">
                <h2>Фронтальный погрузчик</h2>
                <div class="status-badge status-free">Свободен</div>
                <button class="btn-rent" id="btn-loader" onclick="startSession(event, 'loader')">Аренда 10 мин</button>
            </div>

            <div class="vehicle-card" id="card-dump" onclick="selectVehicle('dump_truck')">
                <h2>Самосвал</h2>
                <div class="status-badge status-free">Свободен</div>
                <button class="btn-rent" id="btn-dump" onclick="startSession(event, 'dump_truck')">Аренда 10 мин</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div id="video-container">
            <video id="video-player" autoplay playsinline muted></video>
        </div>

        <div class="hud-overlay">
            <div class="hud-top">
                <button class="hud-btn" onclick="endSession()">⬅ Выход</button>
                <div class="timer-box" id="game-timer">10:00</div>
                <div>
                    <button class="hud-btn" id="btn-camera" onclick="toggleCamera()">Камера: Общая</button>
                    <button class="hud-btn sos" onclick="triggerSOS()">🚨 SOS</button>
                </div>
            </div>

            <div class="joystick-container">
                <div id="zone-joystick-left" class="joystick-zone"></div>
                <div id="zone-joystick-right" class="joystick-zone"></div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран
        tg.ready();

        // Глобальные переменные состояния
        let currentVehicle = 'loader';
        let currentCamera = 'main'; // 'main' или 'fpv'
        let sessionTimer = null;
        let timeLeft = 600; // 10 минут в секундах
        let joysticks = {}; // Хранилище инстансов NippleJS

        // --- ЗАГЛУШКИ ДЛЯ SUPABASE И API ---
        const api = {
            supabaseAuth: () => console.log("[API] Авторизация пользователя в Supabase..."),
            supabaseDeductBalance: (amount) => console.log(`[API] Списание ${amount} с баланса...`),
            supabaseLogSession: (action, vehicle) => console.log(`[API] Сессия ${action} для ${vehicle}`),
            sendControlCommand: (axis, value) => {
                // Здесь будет WebSocket отправка на ESP32/Raspberry
                // console.log(`[RC Command] ${axis}: ${value}`);
            }
        };

        // --- ИНИЦИАЛИЗАЦИЯ ИНТЕРФЕЙСА ---
        window.onload = () => {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                document.getElementById('user-name').innerText = `Привет, ${tg.initDataUnsafe.user.first_name}!`;
            } else {
                document.getElementById('user-name').innerText = 'Привет, Тестер!';
            }
            api.supabaseAuth();
        };

        // Обертка для HapticFeedback (вибрация)
        function haptic(style = 'light') {
            tg.HapticFeedback.impactOccurred(style);
        }

        // Выбор карточки техники
        function selectVehicle(type) {
            haptic();
            currentVehicle = type;
            document.getElementById('card-loader').classList.remove('active');
            document.getElementById('card-dump').classList.remove('active');
            
            if(type === 'loader') document.getElementById('card-loader').classList.add('active');
            if(type === 'dump_truck') document.getElementById('card-dump').classList.add('active');
        }

        // --- ЛОГИКА СЕССИИ (СТАРТ/СТОП) ---
        function startSession(event, type) {
            event.stopPropagation(); // Предотвращаем клик по карточке
            haptic('medium');
            
            api.supabaseDeductBalance(100); // Пример
            api.supabaseLogSession('START', type);

            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            startTimer();
            initJoysticks();
            loadVideoStream('main'); // Запускаем общий стрим
        }

        function endSession() {
            haptic('heavy');
            if(!confirm("Уверены, что хотите завершить аренду?")) return;
            
            clearInterval(sessionTimer);
            api.supabaseLogSession('END', currentVehicle);
            
            // Уничтожаем джойстики, чтобы не было дублей при переподключении
            if(joysticks.left) joysticks.left.destroy();
            if(joysticks.right) joysticks.right.destroy();

            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('video-player').src = ""; // Глушим видео
        }

        function triggerSOS() {
            tg.HapticFeedback.notificationOccurred('error');
            alert("СИГНАЛ SOS! Управление блокировано. Оператор скоро подойдет.");
            // Отправляем жесткий стоп на все каналы
            api.sendControlCommand('ALL_STOP', 1);
        }

        // --- УПРАВЛЕНИЕ КАМЕРОЙ ---
        function toggleCamera() {
            haptic();
            const btn = document.getElementById('btn-camera');
            if (currentCamera === 'main') {
                currentCamera = 'fpv';
                btn.innerText = "Камера: Кабина";
                loadVideoStream(`fpv_${currentVehicle}`);
            } else {
                currentCamera = 'main';
                btn.innerText = "Камера: Общая";
                loadVideoStream('main');
            }
        }

        function loadVideoStream(source) {
            // Заглушка. Здесь будет логика WebRTC от go2rtc
            console.log(`[Video] Подключение к потоку: ${source}`);
            // document.getElementById('video-player').srcObject = webrtcStream;
        }

        // --- ТАЙМЕР ---
        function startTimer() {
            timeLeft = 600;
            updateTimerUI();
            sessionTimer = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) {
                    clearInterval(sessionTimer);
                    alert("Время аренды вышло!");
                    endSession();
                }
            }, 1000);
        }

        function updateTimerUI() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('game-timer').innerText = `${m}:${s}`;
        }

        // --- ДЖОЙСТИКИ И КИНЕМАТИКА ---
        function initJoysticks() {
            const joyOptions = {
                mode: 'static',
                position: { left: '50%', top: '50%' },
                size: 150,
                color: 'rgba(255, 255, 255, 0.5)',
                restOpacity: 0.5
            };

            // Левый джойстик (Ходовая и Рама - одинаково для обоих)
            joysticks.left = nipplejs.create({
                ...joyOptions,
                zone: document.getElementById('zone-joystick-left')
            });

            joysticks.left.on('move', (evt, data) => {
                const y = Math.sin(data.angle.radian) * data.distance; // Вперед/Назад
                const x = Math.cos(data.angle.radian) * data.distance; // Складывание рамы
                api.sendControlCommand('MOVE_Y', y);
                api.sendControlCommand('FRAME_X', x);
            });
            joysticks.left.on('end', () => api.sendControlCommand('MOVE_STOP', 1));

            // Правый джойстик (Рабочее оборудование - зависит от техники)
            joysticks.right = nipplejs.create({
                ...joyOptions,
                zone: document.getElementById('zone-joystick-right'),
                color: 'rgba(255, 159, 10, 0.5)' // Оранжевый для навесного
            });

            joysticks.right.on('move', (evt, data) => {
                const y = Math.sin(data.angle.radian) * data.distance;
                const x = Math.cos(data.angle.radian) * data.distance;

                if (currentVehicle === 'loader') {
                    // Кинематика фронтальника
                    api.sendControlCommand('BOOM_Y', y);   // Стрела вверх/вниз
                    api.sendControlCommand('BUCKET_X', x); // Ковш выворот
                } else if (currentVehicle === 'dump_truck') {
                    // Кинематика самосвала
                    api.sendControlCommand('STEER_X', x);  // Руль влево/вправо
                    api.sendControlCommand('BED_Y', y);    // Кузов вверх/вниз
                }
            });
            joysticks.right.on('end', () => api.sendControlCommand('EQUIPMENT_STOP', 1));
        }
    </script>
</body>
</html>
